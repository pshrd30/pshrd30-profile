  // render function
  function renderMembers(list) {
    const grid = document.getElementById('memberGrid');
    grid.innerHTML = '';
    list.forEach(m => {
      // photo fallback: use id.jpg, id.png, id.heic (but we use id.jpg as standard)
      const photoSrc = m.photo || `${m.id}.jpg`;
      // phone numbers (with country code 880 for whatsapp)
      const phoneMain = m.phone || '';
      const waNumber = phoneMain.replace(/[^0-9]/g, '');
      const waLink = waNumber ? `https://wa.me/880${waNumber}` : '#';
      const emailLink = m.email ? `mailto:${m.email}` : '#';
      const fbLink = m.fb && m.fb !== 'Nai' ? m.fb : '#';
      const callLink = phoneMain ? `tel:${phoneMain}` : '#';

      const card = document.createElement('div');
      card.className = 'member-card';
      card.innerHTML = `
        <img class="avatar" src="${photoSrc}" alt="${m.nameBn}" 
             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22110%22 height=%22110%22 viewBox=%220 0 110 110%22%3E%3Crect width=%22110%22 height=%22110%22 fill=%22%23d9e2ef%22/%3E%3Ctext x=%2232%22 y=%2262%22 fill=%22%233f5a77%22 font-size=%2240%22 font-weight=%22bold%22%3E${m.nameBn.charAt(0)}%3C/text%3E%3C/svg%3E'">
        <div class="member-name-bn">${m.nameBn}</div>
        <div class="member-name-en">${m.nameEn}</div>
        <div class="member-nick"><i class="far fa-smile" style="margin-right:4px;"></i> ${m.nickBn} (${m.nickEn})</div>
        <div class="member-id"><i class="far fa-id-card"></i> ${m.id}</div>
        <div class="extra-meta">
          <span><i class="fas fa-graduation-cap"></i> ${m.batch}</span>
          <span><i class="fas fa-tint"></i> ${m.blood}</span>
          <span><i class="fas fa-map-pin"></i> ${m.district}</span>
        </div>
        <div class="contact-icons">
          <a href="${waLink}" target="_blank" class="whatsapp" title="WhatsApp"><i class="fab fa-whatsapp"></i> </a>
          <a href="${emailLink}" class="email" title="ইমেইল"><i class="fas fa-envelope"></i> </a>
          <a href="${callLink}" class="phone" title="ফোন"><i class="fas fa-phone-alt"></i> </a>
          <a href="${fbLink}" target="_blank" class="fb" title="Facebook"><i class="fab fa-facebook"></i> </a>
        </div>
        ${m.comment ? `<div style="font-size:0.7rem;color:#5e7490;margin-top:6px;font-style:italic;max-width:200px;">💬 ${m.comment}</div>` : ''}
      `;
      grid.appendChild(card);
    });
    document.getElementById('memberCount').innerText = list.length;
  }

  // filter
  function filterMembers() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    const filtered = fullMembers.filter(m => 
      m.nameBn.includes(q) || 
      m.nameEn.toLowerCase().includes(q) || 
      m.nickBn.includes(q) || 
      m.nickEn.toLowerCase().includes(q) || 
      String(m.id).includes(q) ||
      m.district.includes(q)
    );
    renderMembers(filtered);
  }

  // initial render
  renderMembers(fullMembers);
</script>
